family: spad
display_name: "SPAD (Single Photon Avalanche Diode)"
description: "Single-photon sensitive detectors with picosecond timing resolution, used for time-of-flight ranging, NLOS imaging, and fluorescence lifetime measurements."

ranges:
  timing_resolution_ps:
    min: 10.0
    max: 100.0
    typical: 20.0
    unit: picosecond
    description: "TDC resolution across SPAD arrays"
  dead_time_ns:
    min: 5.0
    max: 50.0
    typical: 15.0
    unit: nanosecond
    description: "Dead time after each photon detection event"
  pde:
    min: 0.15
    max: 0.50
    typical: 0.30
    unit: dimensionless
    description: "Photon detection efficiency at peak wavelength"
  dark_count_rate_hz:
    min: 50.0
    max: 1000.0
    typical: 100.0
    unit: hertz
    description: "Dark count rate per pixel at room temperature"
  fov_deg:
    min: 5.0
    max: 40.0
    typical: 20.0
    unit: degree
    description: "Field of view of the SPAD array/module"
  afterpulsing_probability:
    min: 0.001
    max: 0.01
    typical: 0.005
    unit: dimensionless
    description: "Probability of afterpulse following a detection event"
  crosstalk_probability:
    min: 0.001
    max: 0.05
    typical: 0.01
    unit: dimensionless
    description: "Optical/electrical crosstalk probability between adjacent pixels"
  fill_factor:
    min: 0.05
    max: 0.40
    typical: 0.10
    unit: dimensionless
    description: "Ratio of active area to total pixel area"

sensors:
  - name: "TMF8828"
    description: "AMS-OSRAM multi-zone dToF sensor module"
    source: "TMF8828 datasheet rev 1.3, AMS-OSRAM 2023"
    geometric:
      fov: 63.0
      fov_unit: degree
      spatial_resolution: 64.0
      spatial_resolution_unit: pixel
      working_distance_min: 0.1
      working_distance_max: 5.0
    temporal:
      temporal_resolution: 200.0
      temporal_resolution_unit: picosecond
      frame_rate: 30.0
    radiometric:
      quantum_efficiency: 0.25
    operational:
      cost_min_usd: 5.0
      cost_max_usd: 15.0
      power_w: 0.3
      weight_g: 0.5
      form_factor: "module"
    family_specs:
      dead_time_ns: 10.0
      afterpulsing_probability: 0.005
      crosstalk_probability: 0.02
      fill_factor: 0.30
      pde: 0.25

  - name: "VL53L8"
    description: "STMicroelectronics multi-zone ranging sensor"
    source: "VL53L8CX datasheet DS13754, STMicroelectronics 2022"
    geometric:
      fov: 65.0
      spatial_resolution: 64.0
      spatial_resolution_unit: pixel
      working_distance_min: 0.02
      working_distance_max: 4.0
    temporal:
      temporal_resolution: 500.0
      temporal_resolution_unit: picosecond
      frame_rate: 60.0
    radiometric:
      quantum_efficiency: 0.20
    operational:
      cost_min_usd: 3.0
      cost_max_usd: 10.0
      power_w: 0.1
      weight_g: 0.3
      form_factor: "module"
    family_specs:
      dead_time_ns: 12.0
      afterpulsing_probability: 0.003
      crosstalk_probability: 0.015
      fill_factor: 0.25
      pde: 0.20

  - name: "MPD PDM Series"
    description: "Micro Photon Devices PDM single-photon detector module"
    source: "MPD PDM Series datasheet, Micro Photon Devices 2023"
    geometric:
      fov: 5.0
      spatial_resolution: 1.0
      spatial_resolution_unit: pixel
    temporal:
      temporal_resolution: 35.0
      temporal_resolution_unit: picosecond
    radiometric:
      quantum_efficiency: 0.49
      dark_current: 25.0
      dark_current_unit: hertz
    operational:
      cost_min_usd: 2000.0
      cost_max_usd: 5000.0
      power_w: 5.0
      weight_g: 500.0
      form_factor: "benchtop_module"
    family_specs:
      dead_time_ns: 77.0
      afterpulsing_probability: 0.003
      crosstalk_probability: 0.0
      fill_factor: 1.0
      pde: 0.49
