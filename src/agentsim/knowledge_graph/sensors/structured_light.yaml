family: structured_light
display_name: "Structured Light"
description: "Active depth sensors that project known light patterns (dots, fringes, coded) and recover 3D geometry from pattern deformation via triangulation."

ranges:
  baseline_mm:
    min: 20.0
    max: 500.0
    typical: 55.0
    unit: millimeter
    description: "Baseline distance between projector and camera"
  projector_resolution_pixels:
    min: 640.0
    max: 4096.0
    typical: 1280.0
    unit: pixel
    description: "Horizontal resolution of the pattern projector"
  working_distance_m:
    min: 0.1
    max: 10.0
    typical: 1.0
    unit: meter
    description: "Effective working distance range"

sensors:
  - name: "Intel RealSense D415"
    description: "Consumer stereo depth camera with rolling-shutter active IR projector for indoor depth sensing"
    source: "Intel RealSense D415 datasheet rev 004, Intel Corporation 2021"
    geometric:
      fov: 65.0
      fov_unit: degree
      spatial_resolution: 1280.0
      spatial_resolution_unit: pixel
      depth_of_field: 10.0
      depth_of_field_unit: meter
      working_distance_min: 0.16
      working_distance_max: 10.0
    temporal:
      frame_rate: 90.0
      frame_rate_unit: hertz
      readout_mode: "rolling_shutter"
    radiometric:
      spectral_sensitivity_peak_nm: 850.0
    operational:
      cost_min_usd: 140.0
      cost_max_usd: 200.0
      power_w: 3.5
      weight_g: 72.0
      form_factor: "usb_camera"
      operating_environment: "indoor"
    family_specs:
      pattern_type: "dot_pattern"
      projector_resolution: "1280x720"
      baseline_mm: 55.0

  - name: "Photoneo PhoXi 3D Scanner M"
    description: "Industrial structured-light 3D scanner with high accuracy for bin-picking and quality inspection"
    source: "Photoneo PhoXi 3D Scanner M datasheet v2.3, Photoneo s.r.o. 2023"
    geometric:
      fov: 47.0
      fov_unit: degree
      spatial_resolution: 2064.0
      spatial_resolution_unit: pixel
      working_distance_min: 0.458
      working_distance_max: 0.736
    temporal:
      frame_rate: 6.5
      frame_rate_unit: hertz
      readout_mode: "global_shutter"
    radiometric:
      dynamic_range_db: 65.0
    operational:
      cost_min_usd: 5000.0
      cost_max_usd: 10000.0
      power_w: 18.0
      weight_g: 1050.0
      form_factor: "industrial_scanner"
      operating_environment: "indoor_industrial"
    family_specs:
      pattern_type: "phase_shifting"
      projector_resolution: "2064x1544"
      baseline_mm: 170.0

  - name: "Keyence LJ-X8000"
    description: "High-speed inline profile sensor using blue laser structured light for factory inspection"
    source: "Keyence LJ-X8000 Series catalog, Keyence Corporation 2023"
    geometric:
      fov: 25.0
      fov_unit: degree
      spatial_resolution: 3200.0
      spatial_resolution_unit: pixel
      working_distance_min: 0.04
      working_distance_max: 0.12
    temporal:
      frame_rate: 32000.0
      frame_rate_unit: hertz
      readout_mode: "line_scan"
    radiometric:
      spectral_sensitivity_peak_nm: 405.0
    operational:
      cost_min_usd: 10000.0
      cost_max_usd: 20000.0
      power_w: 10.0
      weight_g: 250.0
      form_factor: "inline_sensor_head"
      operating_environment: "indoor_industrial"
    family_specs:
      pattern_type: "laser_line"
      projector_resolution: "3200x1"
      baseline_mm: 35.0
