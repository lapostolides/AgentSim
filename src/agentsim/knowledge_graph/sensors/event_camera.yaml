family: event_camera
display_name: "Event Camera (Dynamic Vision Sensor)"
description: "Neuromorphic sensors where each pixel independently reports brightness changes as asynchronous events with microsecond latency. Used for high-speed tracking, SLAM, and HDR imaging."

ranges:
  contrast_threshold:
    min: 0.1
    max: 0.5
    typical: 0.2
    unit: dimensionless
    description: "Minimum log-intensity change to trigger an event"
  refractory_period_us:
    min: 0.1
    max: 50.0
    typical: 1.0
    unit: microsecond
    description: "Minimum time between successive events from a single pixel"
  bandwidth_khz:
    min: 100.0
    max: 10000.0
    typical: 1000.0
    unit: kilohertz
    description: "Maximum event throughput bandwidth"
  dynamic_range_db:
    min: 80.0
    max: 140.0
    typical: 120.0
    unit: decibel
    description: "Dynamic range of event detection"

sensors:
  - name: "iniVation DVXplorer Lite"
    description: "iniVation compact event camera based on Samsung DVS Gen3 sensor"
    source: "iniVation DVXplorer Lite product specification, iniVation AG 2022"
    geometric:
      fov: 65.0
      fov_unit: degree
      spatial_resolution: 409600.0
      spatial_resolution_unit: pixel
      working_distance_min: 0.3
      working_distance_max: 50.0
    temporal:
      temporal_resolution: 1.0
      temporal_resolution_unit: microsecond
      readout_mode: "event_driven"
    radiometric:
      dynamic_range_db: 86.0
    operational:
      cost_min_usd: 400.0
      cost_max_usd: 600.0
      power_w: 0.5
      weight_g: 30.0
      form_factor: "camera"
    family_specs:
      contrast_threshold: 0.20
      refractory_period_us: 2.0
      bandwidth_khz: 200000.0

  - name: "Prophesee EVK4"
    description: "Prophesee evaluation kit with IMX636 HD event sensor for advanced R&D applications"
    source: "Prophesee EVK4-HD product brief, Prophesee S.A. 2023"
    geometric:
      fov: 67.0
      fov_unit: degree
      spatial_resolution: 921600.0
      spatial_resolution_unit: pixel
      working_distance_min: 0.2
      working_distance_max: 100.0
    temporal:
      temporal_resolution: 0.2
      temporal_resolution_unit: microsecond
      readout_mode: "event_driven"
    radiometric:
      dynamic_range_db: 120.0
    operational:
      cost_min_usd: 3000.0
      cost_max_usd: 5000.0
      power_w: 0.35
      weight_g: 80.0
      form_factor: "evaluation_kit"
    family_specs:
      contrast_threshold: 0.15
      refractory_period_us: 0.5
      bandwidth_khz: 1066000.0

  - name: "Samsung/Sony IMX636"
    description: "Sony IMX636ES event-based vision sensor (Prophesee Metavision technology) for industrial and research use"
    source: "Sony IMX636ES technical specification, Sony Semiconductor Solutions 2022"
    geometric:
      fov: 70.0
      fov_unit: degree
      spatial_resolution: 921600.0
      spatial_resolution_unit: pixel
      working_distance_min: 0.2
      working_distance_max: 100.0
    temporal:
      temporal_resolution: 0.1
      temporal_resolution_unit: microsecond
      readout_mode: "event_driven"
    radiometric:
      dynamic_range_db: 124.0
    operational:
      cost_min_usd: 100.0
      cost_max_usd: 200.0
      power_w: 0.3
      weight_g: 1.0
      form_factor: "chip"
    family_specs:
      contrast_threshold: 0.12
      refractory_period_us: 0.2
      bandwidth_khz: 1066000.0
