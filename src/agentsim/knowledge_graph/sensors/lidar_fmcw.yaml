family: lidar_fmcw
display_name: "LiDAR (FMCW / Coherent)"
description: "Frequency-modulated continuous-wave LiDAR sensors using coherent detection for simultaneous range and velocity measurement with high precision."

ranges:
  chirp_bandwidth_ghz:
    min: 1.0
    max: 20.0
    typical: 10.0
    unit: gigahertz
    description: "Bandwidth of the frequency chirp determining range resolution"
  chirp_duration_us:
    min: 1.0
    max: 100.0
    typical: 10.0
    unit: microsecond
    description: "Duration of a single frequency chirp"
  coherence_length_m:
    min: 10.0
    max: 1000.0
    typical: 100.0
    unit: meter
    description: "Coherence length of the laser source limiting max range"
  max_range_m:
    min: 100.0
    max: 500.0
    typical: 300.0
    unit: meter
    description: "Maximum detection range for diffuse targets"

sensors:
  - name: "Aeva Aeries II"
    description: "Automotive FMCW LiDAR providing simultaneous range and instant velocity per point using silicon photonics"
    source: "Aeva Aeries II product brief, Aeva Inc. 2023"
    geometric:
      fov: 120.0
      fov_unit: degree
      working_distance_min: 0.3
      working_distance_max: 300.0
    temporal:
      frame_rate: 10.0
      frame_rate_unit: hertz
      readout_mode: "fmcw_coherent"
    radiometric:
      spectral_sensitivity_peak_nm: 1550.0
    operational:
      cost_min_usd: 1000.0
      cost_max_usd: 3000.0
      power_w: 25.0
      weight_g: 1500.0
      form_factor: "automotive_module"
      operating_environment: "outdoor_automotive"
    family_specs:
      chirp_bandwidth_ghz: 10.0
      chirp_duration_us: 10.0
      coherence_length_m: 300.0

  - name: "SiLC Eyeonic"
    description: "Silicon photonics-based FMCW LiDAR with integrated coherent receiver for compact, low-cost sensing"
    source: "SiLC Eyeonic Vision System datasheet, SiLC Technologies 2023"
    geometric:
      fov: 80.0
      fov_unit: degree
      working_distance_min: 0.5
      working_distance_max: 200.0
    temporal:
      frame_rate: 15.0
      frame_rate_unit: hertz
      readout_mode: "fmcw_coherent"
    radiometric:
      spectral_sensitivity_peak_nm: 1550.0
    operational:
      cost_min_usd: 2000.0
      cost_max_usd: 5000.0
      power_w: 15.0
      weight_g: 800.0
      form_factor: "compact_module"
      operating_environment: "outdoor_IP67"
    family_specs:
      chirp_bandwidth_ghz: 8.0
      chirp_duration_us: 5.0
      coherence_length_m: 200.0

  - name: "Bridger Photonics Gas-LDAR"
    description: "Long-range FMCW LiDAR optimized for aerial methane detection with exceptional coherence length"
    source: "Bridger Photonics Gas Mapping LiDAR technical spec, Bridger Photonics 2022"
    geometric:
      fov: 40.0
      fov_unit: degree
      working_distance_min: 5.0
      working_distance_max: 500.0
    temporal:
      frame_rate: 5.0
      frame_rate_unit: hertz
      readout_mode: "fmcw_coherent"
    radiometric:
      spectral_sensitivity_peak_nm: 1550.0
    operational:
      cost_min_usd: 50000.0
      cost_max_usd: 150000.0
      power_w: 50.0
      weight_g: 5000.0
      form_factor: "airborne_payload"
      operating_environment: "airborne"
    family_specs:
      chirp_bandwidth_ghz: 15.0
      chirp_duration_us: 50.0
      coherence_length_m: 1000.0
