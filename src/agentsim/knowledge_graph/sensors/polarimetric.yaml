family: polarimetric
display_name: "Polarimetric Camera"
description: "Cameras with integrated micro-polarizer arrays that capture per-pixel polarization state, enabling material classification, glare removal, and surface normal estimation."

ranges:
  extinction_ratio:
    min: 100.0
    max: 1000.0
    typical: 300.0
    unit: dimensionless
    description: "Ratio of transmitted to blocked polarization intensity"
  dolp_accuracy:
    min: 0.005
    max: 0.05
    typical: 0.01
    unit: dimensionless
    description: "Degree of linear polarization measurement accuracy"
  resolution_megapixels:
    min: 1.0
    max: 12.0
    typical: 5.0
    unit: dimensionless
    description: "Effective polarimetric resolution in megapixels"

sensors:
  - name: "Lucid Vision Phoenix PHX050S-P"
    description: "Machine vision polarization camera with Sony IMX250MYR sensor and on-chip wire-grid polarizer array"
    source: "Lucid Vision Phoenix PHX050S-P datasheet, Lucid Vision Labs 2023"
    geometric:
      fov: 42.0
      fov_unit: degree
      spatial_resolution: 2448.0
      spatial_resolution_unit: pixel
    temporal:
      frame_rate: 75.0
      frame_rate_unit: hertz
      readout_mode: "global_shutter"
    radiometric:
      quantum_efficiency: 0.72
      dynamic_range_db: 71.0
      spectral_sensitivity_peak_nm: 530.0
    operational:
      cost_min_usd: 1000.0
      cost_max_usd: 2000.0
      power_w: 4.5
      weight_g: 100.0
      form_factor: "machine_vision_camera"
      operating_environment: "indoor_industrial"
    family_specs:
      extinction_ratio: 350.0
      polarizer_angles_deg: "0,45,90,135"
      dolp_accuracy: 0.01

  - name: "FLIR Blackfly S BFS-U3-51S5P-C"
    description: "USB3 polarization camera with Sony IMX250MZR sensor for machine vision and scientific imaging"
    source: "FLIR Blackfly S BFS-U3-51S5P-C datasheet, Teledyne FLIR 2023"
    geometric:
      fov: 40.0
      fov_unit: degree
      spatial_resolution: 2448.0
      spatial_resolution_unit: pixel
    temporal:
      frame_rate: 75.0
      frame_rate_unit: hertz
      readout_mode: "global_shutter"
    radiometric:
      quantum_efficiency: 0.68
      dynamic_range_db: 69.0
      spectral_sensitivity_peak_nm: 540.0
    operational:
      cost_min_usd: 800.0
      cost_max_usd: 1500.0
      power_w: 3.5
      weight_g: 90.0
      form_factor: "machine_vision_camera"
      operating_environment: "indoor"
    family_specs:
      extinction_ratio: 300.0
      polarizer_angles_deg: "0,45,90,135"
      dolp_accuracy: 0.012

  - name: "4D Technology PolarCam"
    description: "Research-grade snapshot micropolarizer camera for quantitative Stokes vector imaging"
    source: "4D Technology PolarCam Snapshot Micropolarizer Camera datasheet, 4D Technology 2022"
    geometric:
      fov: 30.0
      fov_unit: degree
      spatial_resolution: 1224.0
      spatial_resolution_unit: pixel
    temporal:
      frame_rate: 30.0
      frame_rate_unit: hertz
      readout_mode: "global_shutter"
    radiometric:
      quantum_efficiency: 0.55
      dynamic_range_db: 60.0
      spectral_sensitivity_peak_nm: 550.0
    operational:
      cost_min_usd: 8000.0
      cost_max_usd: 15000.0
      power_w: 5.0
      weight_g: 350.0
      form_factor: "scientific_camera"
      operating_environment: "laboratory"
    family_specs:
      extinction_ratio: 500.0
      polarizer_angles_deg: "0,45,90,135"
      dolp_accuracy: 0.005
