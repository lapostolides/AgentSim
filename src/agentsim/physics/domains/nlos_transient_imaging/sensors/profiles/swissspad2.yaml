name: "SwissSPAD2"
sensor_type: spad
manufacturer: "EPFL"
reference: "Ulku et al. 2019"
timing:
  temporal_resolution_ps:
    min: 17.8
    max: 17.8
    typical: 17.8
    description: "Fixed TDC resolution"
  jitter_fwhm_ps:
    min: 50
    max: 100
    typical: 70
    description: "SPAD timing jitter FWHM"
  dead_time_ns:
    min: 5
    max: 25
    typical: 10
    description: "Pixel dead time after detection"
spatial:
  array_size: [512, 512]
  pixel_pitch_um: 16.38
  fill_factor: 0.105
noise:
  dark_count_rate_hz: 100
  afterpulsing_probability: 0.003
  crosstalk_probability: 0.01
  quantum_efficiency: 0.35
operational_modes:
  - name: time_gated
    timing_constraints:
      gate_width_ns: 10.0
    description: "Time-gated mode with programmable gate width"
  - name: free_running
    timing_constraints: {}
    description: "Free-running TCSPC mode"
transfer_functions:
  - input: temporal_resolution_ps
    output: depth_resolution_m
    relationship: linear
    formula: "c * dt / 2"
    description: "Depth resolution from TDC bin width"
    coupling_strength: strong
  - input: dead_time_ns
    output: max_count_rate_mhz
    relationship: inverse
    formula: "max_rate ≈ 1 / dead_time"
    description: "Pile-up limit: maximum photon count rate before saturation"
    coupling_strength: strong
  - input: jitter_fwhm_ps
    output: effective_temporal_resolution_ps
    relationship: sqrt
    formula: "sigma_eff = sqrt(sigma_jitter^2 + sigma_tdc^2)"
    description: "Timing jitter adds in quadrature with TDC resolution"
    coupling_strength: strong
  - input: quantum_efficiency
    output: min_exposure_time_s
    relationship: inverse
    formula: "t_min ∝ 1 / QE"
    description: "Higher quantum efficiency enables shorter exposures"
    coupling_strength: moderate
